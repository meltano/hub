capabilities:
- about
- activate-version
- batch
- catalog
- discover
- schema-flattening
- state
- stream-maps
- structured-logging
description: A Singer tap for extracting Yandex Cloud billing usage and cost 
  data.
domain_url: https://yandex.cloud
executable: tap-yandex-cloud
keywords:
- meltano_sdk
label: Yandex Cloud
logo_url: /assets/logos/extractors/yandex-cloud.png
maintenance_status: active
name: tap-yandex-cloud
namespace: tap_yandex_cloud
next_steps: ''
pip_url: tap-yandex-cloud
quality: unknown
repo: https://github.com/data7m/tap-yandex-cloud
settings:
- description: Yandex Billing aggregation period. For the first version, use 
    DAY.
  kind: string
  label: Aggregation Period
  name: aggregation_period
  value: DAY
- description: Yandex Cloud Billing Usage gRPC API endpoint.
  kind: string
  label: API Endpoint
  name: api_endpoint
  value: billing.api.cloud.yandex.net:443
- description: Compression format to use for batch files.
  kind: options
  label: Batch Compression Format
  name: batch_config.encoding.compression
  options:
  - label: GZIP
    value: gzip
  - label: None
    value: none
- description: Format to use for batch files.
  kind: options
  label: Batch Encoding Format
  name: batch_config.encoding.format
  options:
  - label: JSONL
    value: jsonl
  - label: Parquet
    value: parquet
- description: Prefix to use when writing batch files.
  kind: string
  label: Batch Storage Prefix
  name: batch_config.storage.prefix
- description: Root path to use when writing batch files.
  kind: string
  label: Batch Storage Root
  name: batch_config.storage.root
- description: Yandex Cloud billing account ID to fetch usage and cost data for.
  kind: string
  label: Billing Account ID
  name: billing_account_id
- description: Optional upper bound for usage data extraction. If omitted, the 
    tap uses yesterday in UTC.
  kind: date_iso8601
  label: End Date
  name: end_date
- description: 'One or more LCID locale strings to produce localized output for: https://faker.readthedocs.io/en/master/#localization'
  kind: array
  label: Faker Locale
  name: faker_config.locale
- description: 'Value to seed the Faker generator for deterministic output: https://faker.readthedocs.io/en/master/#seeding-the-generator'
  kind: string
  label: Faker Seed
  name: faker_config.seed
- description: "'True' to enable schema flattening and automatically expand nested
    properties."
  kind: boolean
  label: Enable Schema Flattening
  name: flattening_enabled
- description: The max depth to flatten schemas.
  kind: integer
  label: Max Flattening Depth
  name: flattening_max_depth
- description: The maximum length of a flattened key.
  kind: integer
  label: Max Key Length
  name: flattening_max_key_length
- description: The separator to use when flattening keys.
  kind: string
  label: Flattening Separator
  name: flattening_separator
- description: Short-lived Yandex Cloud IAM token. Useful for local testing. For
    production, prefer service_account_key_json.
  kind: password
  label: IAM Token
  name: iam_token
  sensitive: true
- description: Number of days to re-read before the last saved state date to 
    handle late billing adjustments.
  kind: integer
  label: Lookback Days
  name: lookback_days
  value: 7
- description: Yandex Cloud service account authorized key JSON. Used to 
    authenticate automatically without manually rotating IAM tokens.
  kind: password
  label: Service Account Key JSON
  name: service_account_key_json
  sensitive: true
- description: Lower bound for usage data extraction. Used as the initial start 
    date before state exists.
  kind: date_iso8601
  label: Start Date
  name: start_date
- description: User-defined config values to be used within map expressions.
  kind: object
  label: User Stream Map Configuration
  name: stream_map_config
- description: Currently, only setting this to `__NULL__` is supported. This 
    will remove all other streams.
  kind: string
  label: Other streams
  name: stream_maps.__else__
settings_group_validation:
- - billing_account_id
  - start_date
  - iam_token
- - billing_account_id
  - start_date
  - service_account_key_json
settings_preamble: ''
usage: ''
variant: data7m
