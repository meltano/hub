capabilities:
- catalog
- state
- discover
- activate-version
- about
- stream-maps
- schema-flattening
- batch
- structured-logging
description: 'Singer tap for the Meta Graph API (Instagram): account-level (user) insights and media with per-post insights, built with the Meltano Singer SDK.'
domain_url: https://developers.facebook.com/docs/instagram-api
label: Instagram User Insights
logo_url: /assets/logos/extractors/instagram.png
maintenance_status: active
name: tap-instagram-user
namespace: tap_instagram_user
next_steps: ''
pip_url: plinxore-tap-instagram-user
quality: unknown
repo: https://github.com/plinxore/tap-instagram-user
settings:
- description: The client's Long-Lived Token
  kind: password
  label: Access Token
  name: access_token
  sensitive: true
- description: The professional Instagram account ID
  kind: string
  label: IG User ID
  name: ig_user_id
- description: 'List of metrics (and their breakdowns) to extract; one stream is generated per metric/breakdown
    combination. Each entry may override start_date/days_to_subtract/period/timeframe/metric_type/generate_dates_range
    for itself; otherwise the global value above applies. Required: no default value.'
  kind: array
  label: Metrics
  name: metrics
- description: Compression format to use for batch files.
  kind: options
  label: Batch Compression Format
  name: batch_config.encoding.compression
  options:
  - label: Gzip
    value: gzip
  - label: None
    value: none
- description: Format to use for batch files.
  kind: options
  label: Batch Encoding Format
  name: batch_config.encoding.format
  options:
  - label: Jsonl
    value: jsonl
  - label: Parquet
    value: parquet
- description: Prefix to use when writing batch files.
  kind: string
  label: Batch Storage Prefix
  name: batch_config.storage.prefix
- description: Root path to use when writing batch files.
  kind: string
  label: Batch Storage Root
  name: batch_config.storage.root
- description: Default number of already-covered days to re-extract on each run, in addition to genuinely
    new days (overlap window, useful because Meta insights can still be corrected after their first extraction).
    0 = no re-extraction. Overridable per entry in `metrics`.
  kind: integer
  label: Days To Subtract
  name: days_to_subtract
  value: 0
- description: 'One or more LCID locale strings to produce localized output for: https://faker.readthedocs.io/en/master/#localization'
  kind: string
  label: Faker Locale
  name: faker_config.locale
- description: 'Value to seed the Faker generator for deterministic output: https://faker.readthedocs.io/en/master/#seeding-the-generator'
  kind: string
  label: Faker Seed
  name: faker_config.seed
- description: '''True'' to enable schema flattening and automatically expand nested properties.'
  kind: boolean
  label: Enable Schema Flattening
  name: flattening_enabled
- description: The max depth to flatten schemas.
  kind: integer
  label: Max Flattening Depth
  name: flattening_max_depth
- description: The maximum length of a flattened key.
  kind: integer
  label: Max Key Length
  name: flattening_max_key_length
- description: The separator to use when flattening keys.
  kind: string
  label: Flattening Separator
  name: flattening_separator
- description: '''active'' (default): one API call per day (since/until = 1 day). ''inactive'': a single
    call covering the whole since/until range (fewer API calls, but loses day-by-day granularity depending
    on what the API returns for the metric). Overridable per entry in `metrics`.'
  kind: options
  label: Generate Dates Range
  name: generate_dates_range
  options:
  - label: Active
    value: active
  - label: Inactive
    value: inactive
  value: active
- description: Optional rolling refresh window (days). When set, only the first run backfills (down to media_since);
    later runs fetch just the last N days, so frozen old posts are not re-listed nor their insights re-fetched.
    Omit for a full snapshot every run. No default (affects completeness; opt-in).
  kind: integer
  label: Media Active Window Days
  name: media_active_window_days
- description: Fields to request on the /media edge for the ig_media stream (must include media_product_type for
    the insights children). No default; required to enable media extraction.
  kind: array
  label: Media Fields
  name: media_fields
- description: Page size (limit) for the /media edge.
  kind: integer
  label: Media Limit
  name: media_limit
  value: 100
- description: Maximum number of pages to fetch from the /media edge (safety cap against an unbounded pagination
    loop).
  kind: integer
  label: Media Max Pages
  name: media_max_pages
  value: 100
- description: Maps each media_product_type (FEED/REELS/STORY) to the list of metrics valid for it, so invalid metric/type
    calls are skipped. No default; required when media_metrics is set.
  kind: object
  label: Media Metric Compatibility
  name: media_metric_compatibility
- description: 'Optional second compatibility axis: maps each media_type (IMAGE/VIDEO/CAROUSEL_ALBUM) to the metrics
    valid for it. When set, a metric is requested only if valid for both the post''s media_product_type and media_type
    (e.g. views applies to VIDEO only). Requires media_type in media_fields.'
  kind: object
  label: Media Metric Compatibility By Media Type
  name: media_metric_compatibility_by_media_type
- description: Per-post insight metrics to extract; one ig_media_<metric> stream is generated per metric/breakdown
    combination. Requires media_fields and media_metric_compatibility.
  kind: array
  label: Media Metrics
  name: media_metrics
- description: Optional floor date for the /media list (sent as the `since` Unix timestamp). Bounds the first-run
    backfill. No default (omit = full catalogue, capped at Meta's ~10K most recent media).
  kind: date_iso8601
  label: Media Since
  name: media_since
- description: Optional ceiling date for the /media list (sent as `until`). Usually unset (= up to now); useful
    for backfilling a fixed window.
  kind: date_iso8601
  label: Media Until
  name: media_until
- description: Default `metric_type` parameter passed to the Meta Insights API for each metric. Overridable
    per entry in `metrics`.
  kind: string
  label: Metric Type
  name: metric_type
  value: total_value
- description: Behaviour when Meta rejects a media-insights metric with 'does not support the metric' despite the
    compatibility tables. 'fail' (default) stops the run (stale-table signal, no silent loss); 'skip' logs a WARNING
    and skips that post/metric.
  kind: options
  label: On Unsupported Metric
  name: on_unsupported_metric
  options:
  - label: Fail
    value: fail
  - label: Skip
    value: skip
  value: fail
- description: Default granularity requested from the Meta Insights API (`period` parameter). Overridable
    per entry in `metrics`.
  kind: string
  label: Period
  name: period
  value: day
- description: 'Default ''start_date'' for all metrics on first extraction (ignored once a bookmark exists). Overridable
    per entry in `metrics` (e.g. 2026-05-01T00:00:00Z). No default: required on a stream''s first run (it fails
    fast if neither this nor a per-metric start_date is set).'
  kind: date_iso8601
  label: Start Date
  name: start_date
- description: User-defined config values to be used within map expressions.
  kind: object
  label: User Stream Map Configuration
  name: stream_map_config
- description: Default optional `timeframe` parameter passed to the Meta Insights API. Overridable per
    entry in `metrics`.
  kind: string
  label: Timeframe
  name: timeframe
- description: Fields to request on the IG User node for the `ig_user` stream (e.g. username, followers_count, follows_count,
    media_count). No default (Meta-controlled vocabulary). Set to enable the account-profile snapshot; omit to skip
    it.
  kind: array
  label: User Fields
  name: user_fields
settings_group_validation:
- - access_token
  - ig_user_id
  - metrics
settings_preamble: ''
usage: ''
variant: plinxore
