capabilities:
- about
- activate-version
- batch
- catalog
- discover
- schema-flattening
- state
- stream-maps
- structured-logging
description: HR Platform
domain_url: https://www.bamboohr.com/
keywords:
- meltano_sdk
label: BambooHR
logo_url: /assets/logos/extractors/bamboohr.png
maintenance_status: active
name: tap-bamboohr
namespace: autoidm_tap_bamboohr
next_steps: ''
pip_url: git+https://github.com/AutoIDM/autoidm-tap-bamboohr.git
quality: gold
repo: https://github.com/AutoIDM/autoidm-tap-bamboohr
settings:
- description: Token gathered from BambooHR, instructions are 
    [here](https://documentation.bamboohr.com/docs#section-authentication)
  kind: password
  label: Auth Token
  name: auth_token
  sensitive: true
- description: Compression format to use for batch files.
  kind: options
  label: Batch Compression Format
  name: batch_config.encoding.compression
  options:
  - label: GZIP
    value: gzip
  - label: None
    value: none
- description: Format to use for batch files.
  kind: options
  label: Batch Encoding Format
  name: batch_config.encoding.format
  options:
  - label: JSONL
    value: jsonl
  - label: Parquet
    value: parquet
- description: Prefix to use when writing batch files.
  kind: string
  label: Batch Storage Prefix
  name: batch_config.storage.prefix
- description: Root path to use when writing batch files.
  kind: string
  label: Batch Storage Root
  name: batch_config.storage.root
- description: CustomReport full body definition, example in meltano. Yml, same 
    format as the Body for the POST request 
    [here](https://documentation.bamboohr.com/reference/request-custom-report-1)
  kind: array
  label: Custom Reports
  name: custom_reports
- description: 'One or more LCID locale strings to produce localized output for: https://faker.readthedocs.io/en/master/#localization'
  kind: array
  label: Faker Locale
  name: faker_config.locale
- description: 'Value to seed the Faker generator for deterministic output: https://faker.readthedocs.io/en/master/#seeding-the-generator'
  kind: string
  label: Faker Seed
  name: faker_config.seed
- description: Either `fail` or `ignore`. Determines behavior when fields 
    returned by API don't match fields specified in tap config.
  kind: options
  label: Field Mismatch
  name: field_mismatch
  options:
  - label: Fail
    value: fail
  - label: Ignore
    value: ignore
  value: fail
- description: "'True' to enable schema flattening and automatically expand nested
    properties."
  kind: boolean
  label: Enable Schema Flattening
  name: flattening_enabled
- description: The max depth to flatten schemas.
  kind: integer
  label: Max Flattening Depth
  name: flattening_max_depth
- description: The maximum length of a flattened key.
  kind: integer
  label: Max Key Length
  name: flattening_max_key_length
- description: Size of photos to return from the photos stream. Pixel size 
    information can be found in the 
    [docs](https://documentation.bamboohr.com/reference/get-employee-photo-1)
  kind: options
  label: Photo Size
  name: photo_size
  options:
  - label: Original
    value: original
  - label: Large
    value: large
  - label: Medium
    value: medium
  - label: Small
    value: small
  - label: Xs
    value: xs
  - label: Tiny
    value: tiny
  value: original
- description: User-defined config values to be used within map expressions.
  kind: object
  label: User Stream Map Configuration
  name: stream_map_config
- description: Config object for stream maps capability. For more information 
    check out [Stream Maps](https://sdk.meltano.com/en/latest/stream_maps.html).
  kind: object
  label: Stream Maps
  name: stream_maps
- description: Subdomain from BambooHR
  kind: string
  label: Subdomain
  name: subdomain
settings_group_validation:
- - auth_token
  - field_mismatch
  - photo_size
  - subdomain
settings_preamble: ''
supported_python_versions:
- '3.10'
- '3.11'
- '3.12'
- '3.13'
- '3.14'
usage: ''
variant: autoidm
