capabilities:
- about
- activate-version
- batch
- catalog
- discover
- schema-flattening
- state
- stream-maps
- structured-logging
description: Singer tap for Adanos stock and crypto market sentiment data.
docs: https://api.adanos.org/docs
domain_url: https://adanos.org/
executable: tap-adanos
keywords:
- api
- finance
- market-sentiment
- meltano_sdk
label: Adanos
log_parser: singer-sdk
logo_url: /assets/logos/extractors/adanos.svg
maintenance_status: active
name: tap-adanos
namespace: tap_adanos
pip_url: tap-adanos
quality: silver
repo: https://github.com/adanos-software/tap-adanos
settings:
- description: Adanos API key from https://adanos.org/register.
  kind: password
  label: API Key
  name: api_key
  sensitive: true
- description: Asset class to extract. Crypto currently uses Reddit data.
  kind: options
  label: Asset Type
  name: asset_type
  options:
  - label: Stock
    value: stock
  - label: Crypto
    value: crypto
  value: stock
- description: Adanos API base URL. Override for testing or private gateways.
  kind: string
  label: Base URL
  name: base_url
  value: https://api.adanos.org
- description: Compression format to use for batch files.
  kind: options
  label: Batch Compression Format
  name: batch_config.encoding.compression
  options:
  - label: GZIP
    value: gzip
  - label: None
    value: none
- description: Format to use for batch files.
  kind: options
  label: Batch Encoding Format
  name: batch_config.encoding.format
  options:
  - label: JSONL
    value: jsonl
  - label: Parquet
    value: parquet
- description: Prefix to use when writing batch files.
  kind: string
  label: Batch Storage Prefix
  name: batch_config.storage.prefix
- description: Root path to use when writing batch files.
  kind: string
  label: Batch Storage Root
  name: batch_config.storage.root
- description: Inclusive UTC end date. Defaults to the current UTC date.
  kind: date_iso8601
  label: End Date
  name: end_date
- description: 'One or more LCID locale strings to produce localized output for: https://faker.readthedocs.io/en/master/#localization'
  kind: array
  label: Faker Locale
  name: faker_config.locale
- description: 'Value to seed the Faker generator for deterministic output: https://faker.readthedocs.io/en/master/#seeding-the-generator'
  kind: string
  label: Faker Seed
  name: faker_config.seed
- description: "'True' to enable schema flattening and automatically expand nested
    properties."
  kind: boolean
  label: Enable Schema Flattening
  name: flattening_enabled
- description: The max depth to flatten schemas.
  kind: integer
  label: Max Flattening Depth
  name: flattening_max_depth
- description: The maximum length of a flattened key.
  kind: integer
  label: Max Key Length
  name: flattening_max_key_length
- description: The separator to use when flattening keys.
  kind: string
  label: Flattening Separator
  name: flattening_separator
- description: Page size for trending assets.
  kind: integer
  label: Page Size
  name: page_size
  value: 100
- description: Inclusive UTC start date within the account plan's lookback.
  kind: date_iso8601
  label: Start Date
  name: start_date
- description: Sentiment source for stocks. Ignored for crypto.
  kind: options
  label: Stock Source
  name: stock_source
  options:
  - label: Reddit
    value: reddit
  - label: X
    value: x
  - label: News
    value: news
  - label: Polymarket
    value: polymarket
  value: reddit
- description: User-defined config values to be used within map expressions.
  kind: object
  label: User Stream Map Configuration
  name: stream_map_config
- description: Config object for stream maps capability. For more information 
    check out [Stream Maps](https://sdk.meltano.com/en/latest/stream_maps.html).
  kind: object
  label: Stream Maps
  name: stream_maps
- description: Stock tickers or crypto symbols used by detail and comparison 
    streams.
  kind: array
  label: Symbols
  name: symbols
settings_group_validation:
- - api_key
  - start_date
  - symbols
supported_python_versions:
- '3.10'
- '3.11'
- '3.12'
- '3.13'
- '3.14'
variant: adanos-software
