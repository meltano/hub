capabilities:
- about
- batch
- catalog
- discover
- schema-flattening
- state
- stream-maps
description: Cloud marketplace automation for AWS, Azure, GCP and Snowflake
domain_url: https://www.suger.io
executable: tap-suger
keywords:
- meltano_sdk
- marketplace
- finance
label: Suger
maintenance_status: active
name: tap-suger
namespace: tap_suger
next_steps: ''
pip_url: git+https://github.com/pulumi/tap-suger.git
quality: unknown
repo: https://github.com/pulumi/tap-suger
settings:
- description: Suger OAuth App client id (API keys are deprecated). Create an OAuth
    App at https://console.suger.io/settings?tab=api_client
  kind: password
  label: OAuth Client ID
  name: client_id
  sensitive: true
- description: Suger OAuth App client secret (shown only once at creation).
  kind: password
  label: OAuth Client Secret
  name: client_secret
  sensitive: true
- description: Suger organization id that requests are scoped to.
  kind: string
  label: Organization ID
  name: organization_id
- description: Base URL for the Suger API (also the OAuth token audience).
  kind: string
  label: API URL
  name: api_url
  value: https://api.suger.cloud
- description: OAuth 2.0 client-credentials token endpoint.
  kind: string
  label: OAuth Token URL
  name: token_url
  value: https://apiv2.suger.cloud/oauth2/token
- description: Earliest record datetime to sync (ISO 8601).
  kind: date_iso8601
  label: Start Date
  name: start_date
- description: Config object for stream maps capability. For more information check
    out [Stream Maps](https://sdk.meltano.com/en/latest/stream_maps.html).
  kind: object
  label: Stream Maps
  name: stream_maps
- description: User-defined config values to be used within map expressions.
  kind: object
  label: User Stream Map Configuration
  name: stream_map_config
- description: "'True' to enable schema flattening and automatically expand nested
    properties."
  kind: boolean
  label: Enable Schema Flattening
  name: flattening_enabled
- description: The max depth to flatten schemas.
  kind: integer
  label: Max Flattening Depth
  name: flattening_max_depth
settings_group_validation:
- - client_id
  - client_secret
  - organization_id
settings_preamble: ''
supported_python_versions:
- '3.9'
- '3.10'
- '3.11'
- '3.12'
- '3.13'
usage: ''
variant: pulumi
