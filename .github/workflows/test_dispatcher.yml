
name: Plugin 'Test' Command Dispatcher

permissions:
  contents: read
  pull-requests: read  # Find PR comments

on:
  pull_request_target: # zizmor: ignore[dangerous-triggers]
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "_data/meltano/*/*/*.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  get_changed_files:
    name: Get changed files
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed_files.outputs.all_changed_files }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          persist-credentials: false

      - name: Get changed files
        id: changed_files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          sha: ${{ github.event.pull_request.head.sha }}
          files: _data/meltano/**/*.yml
          files_ignore: _data/meltano/**/airbyte.yml
          matrix: true

  dispatch_tests:
    name: Dispatch tests
    runs-on: ubuntu-latest
    needs:
      - get_changed_files
    strategy:
      matrix:
        changed_file: ${{ fromJson(needs.get_changed_files.outputs.matrix) }}
      max-parallel: 4
      fail-fast: false
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Install yq
        env:
          VERSION: v4.28.2
          BINARY: yq_linux_amd64
        run: >
          wget https://github.com/mikefarah/yq/releases/download/${VERSION}/${BINARY}.tar.gz -O - |
          tar xz && mv ${BINARY} yq && chmod u+x yq

      - name: Get the name and pip url
        id: plugin-info
        run: |
          name="$(basename "$(dirname "${MATRIX_CHANGED_FILE}")")"
          plugin_type="$(basename $(dirname "$(dirname "${MATRIX_CHANGED_FILE}")"))"
          plugin_path="${MATRIX_CHANGED_FILE}"
          variant="$(./yq '.variant' "${MATRIX_CHANGED_FILE}")"
          echo "name=${name}" >> $GITHUB_OUTPUT
          echo "plugin_type=${plugin_type}" >> $GITHUB_OUTPUT
          echo "plugin_path=${plugin_path}" >> $GITHUB_OUTPUT
          echo "prelude=Testing plugin \`${name}\` (\`${variant}\` variant):" >> $GITHUB_OUTPUT
        env:
          MATRIX_CHANGED_FILE: ${{ matrix.changed_file }}

      - name: Find the MeltyBot test-command comment if it exists
        id: find_comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: ${{ steps.plugin-info.outputs.prelude }}

      - uses: octokit/request-action@b91aabaa861c777dcdb14e2387e30eddf04619ae # v3.0.0
        with:
          route: "POST /repos/${{ github.repository }}/actions/workflows/test-plugin-command.yml/dispatches"
          ref: 'main'
          inputs: |
            {
              "repository": "${{ github.repository }}",
              "comment-id": "${{ steps.find_comment.outputs.comment-id }}",
              "issue-number": "${{ github.event.pull_request.number }}",
              "name": "${{ steps.plugin-info.outputs.name }}",
              "plugin-type": "${{ steps.plugin-info.outputs.plugin_type }}",
              "plugin-path": "${{ steps.plugin-info.outputs.plugin_path }}",
              "git-ref": "${{ github.event.pull_request.head.sha }}",
              "prepend-text": "${{ steps.plugin-info.outputs.prelude }}"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.MELTYBOT_GITHUB_AUTH_TOKEN }}
