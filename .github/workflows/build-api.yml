name: Build and publish Meltano Hub API

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
  workflow_dispatch:
    inputs:
      hub-url:
        description: The base URL of the Meltano Hub site
        required: true
        default: 'https://hub.meltano.com'
      api-url:
        description: The base URL of the Hub API
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build API files
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'production' || 'preview' }}
    if: ${{ !github.event.pull_request.head.repo.fork }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0

    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

    - name: Install dependencies
      run: |
        uv sync

    - name: Set preview variables
      if: github.event_name == 'pull_request'
      env:
        PR_NUMBER: ${{ github.event.number }}
      run: |
        echo "HUB_URL=https://deploy-preview-${PR_NUMBER}--meltano-hub.netlify.app" >> $GITHUB_ENV

    - name: Set production variables
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        echo "HUB_URL=https://hub.meltano.com" >> $GITHUB_ENV

    - name: Set custom variables
      if: github.event_name == 'workflow_dispatch'
      run: |
        echo "HUB_URL=${GITHUB_EVENT_INPUTS_HUB_URL}" >> $GITHUB_ENV
      env:
        GITHUB_EVENT_INPUTS_HUB_URL: ${{ github.event.inputs.hub-url }}

    - name: Build
      env:
        API_URL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.api-url || secrets.HUB_API_URL }}
      run: >
        uv run python utility_scripts/api/make_files.py
        -o _hub_api
        --hub-url ${HUB_URL}
        --api-url ${API_URL}

    - name: Test API Schema
      run: >
        uv run python utility_scripts/api/api_schema_validate.py

    - name: Upload artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: hub-api-files
        path: "_hub_api/*"

  publish:
    name: Publish API files
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'production' || 'preview' }}
    needs: build
    if: ${{ github.actor != 'dependabot[bot]' }}
    permissions:
      id-token: write # This is required for requesting the JWT
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: us-west-2
        role-session-name: "GitHubActions"
    - name: Download artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: hub-api-files
        path: "_hub_api"
    - name: Upload to S3
      env:
        HUB_API_S3_BUCKET: ${{ secrets.HUB_API_S3_BUCKET }}
      run: |
        aws s3 sync _hub_api "s3://${HUB_API_S3_BUCKET}/hub-api"
