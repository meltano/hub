name: Test Meltano add/install

on:
  push:
    branches: [main]
    paths: [_data/meltano/*/*/*.yml]
  pull_request:
    branches: [main]
    paths: [_data/meltano/*/*/*.yml]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  get_changed_plugins:
    name: Get changed plugins
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed_plugins.outputs.all_changed_files }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get changed plugins
        id: changed_plugins
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: _data/meltano/*/*/*.yml
          matrix: true

  test:
    name: Install plugin with Meltano
    runs-on: ubuntu-latest
    needs: get_changed_plugins
    strategy:
      matrix:
        file: ${{ fromJSON(needs.get_changed_plugins.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install Meltano
        run: uv tool install --from git+https://github.com/meltano/meltano.git@main meltano

      - name: Setup test project
        run: meltano init --no-usage-stats test-project

      - name: Configure Meltano
        working-directory: test-project
        run: |
          meltano config set meltano cli.log_level debug
          meltano config set meltano venv.backend uv

      - name: Test add
        working-directory: test-project
        env:
          MATRIX_FILE: ${{ matrix.file }}
          GIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          ref=https://raw.githubusercontent.com/meltano/hub/${GIT_SHA}/${MATRIX_FILE}
          type=$(basename $(dirname $(dirname ${MATRIX_FILE})))
          name=$(basename $(dirname ${MATRIX_FILE}))

          meltano add --no-install --from-ref $ref $type $name

      - name: Test install
        working-directory: test-project
        run: meltano install
