version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: weekly
      time: "12:00"
      timezone: "Etc/UTC"
    labels: [deps]
    groups:
      all:
        patterns:
          - "*"
    cooldown:
      default-days: 7
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: [deps]
    groups:
      github-actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7
